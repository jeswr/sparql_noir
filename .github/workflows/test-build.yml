name: Test Build and Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    # The round-3 main-event branch runs its own trimmed CI in
    # round3-ci.yml; the full matrix is restored by the final commit
    # (`chore(ci): restore full CI matrix before merge`).
    paths-ignore:
      - 'spec/**'
      - 'SPARQL_ROADMAP.md'
      - 'DELETION_CANDIDATES.md'
      - 'questions/**'

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip the full test-build matrix for the round-3 main-event PR;
    # the trimmed `round3-ci.yml` workflow is the gate. Restored by
    # the final pre-merge commit.
    if: github.event_name != 'pull_request' || github.head_ref != 'feat/not-exists-sorted-commitment'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build TypeScript
      run: npm run build:tsc

    - name: Test benchmark tool help
      run: npm run benchmark:help

    - name: Test benchmark tool list
      run: npm run benchmark:list

    - name: Check if benchmark tool is working
      run: |
        echo "✅ Benchmark tool is working!"
        echo "Note: Full circuit benchmarking requires Noir installation"
        echo "See the benchmark.yml workflow for full benchmark testing"