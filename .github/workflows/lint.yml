# Canonical lint workflow for TypeScript-circuit sub-repos
# (currently only `circuits/sparql_noir`).
#
# Source of truth: zkp-sparql-workspace/templates/sub-repo/ts-circuit/.github/workflows/lint.yml.tmpl
# Rendered by:    zkp-sparql-workspace/scripts/sync-standards.sh
#
# Covers: TypeScript (eslint + prettier + tsc), Noir, Python, shell,
# Markdown, TOML, JSON.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript (prettier + tsc + eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: prettier --check
        run: |
          npx prettier --check '**/*.{ts,tsx,js,jsx,mjs,cjs,json,md}' || \
            echo "::warning::prettier formatting drift; run 'npx prettier --write'"
        continue-on-error: true
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: eslint
        run: |
          if [ -f eslint.config.cjs ] || [ -f eslint.config.js ] || [ -f .eslintrc.json ]; then
            npx eslint '**/*.{ts,tsx,js,mjs,cjs}' --max-warnings 0
          else
            echo "no eslint config; skipping"
          fi
        continue-on-error: true

  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff==0.7.4"
      - run: ruff check .
        continue-on-error: true
      - run: ruff format --check .
        continue-on-error: true

  shell:
    name: Shell (shellcheck + shfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          curl -sSfL -o /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          sudo install -m 755 /tmp/shfmt /usr/local/bin/shfmt
      - name: shellcheck
        run: |
          mapfile -t FILES < <(git ls-files '*.sh' '*.bash' 2>/dev/null)
          [ ${#FILES[@]} -eq 0 ] || shellcheck "${FILES[@]}"
      - name: shfmt -d
        run: |
          mapfile -t FILES < <(git ls-files '*.sh' '*.bash' 2>/dev/null)
          [ ${#FILES[@]} -eq 0 ] || shfmt -i 2 -ci -d "${FILES[@]}"

  markdown:
    name: Markdown (markdownlint-cli2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g markdownlint-cli2@0.14.0
      - run: markdownlint-cli2

  toml:
    name: TOML (taplo)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install taplo
        run: |
          curl -sSfL https://github.com/tamasfe/taplo/releases/download/0.9.3/taplo-full-linux-x86_64.gz \
            | gunzip > /tmp/taplo
          sudo install -m 755 /tmp/taplo /usr/local/bin/taplo
      - run: taplo fmt --check
      - run: taplo lint

  noir-fmt:
    name: Noir (nargo fmt --check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Noir
        uses: noir-lang/noirup@v0.1.4
      - name: nargo fmt --check
        run: |
          if [ -d noir ]; then
            (cd noir && nargo fmt --check) || true
          fi
        continue-on-error: true
